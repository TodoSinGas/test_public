<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pollo 3D</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="module">
  import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

  // Escena y cámara
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,7);
  scene.add(light);

  // Suelo
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshPhongMaterial({color:0x228B22})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Pollo (esfera amarilla)
  const chicken = new THREE.Mesh(
    new THREE.SphereGeometry(1,32,32),
    new THREE.MeshPhongMaterial({color:0xffff00})
  );
  chicken.position.y = 1;
  scene.add(chicken);

  // Cámara en tercera persona
  camera.position.set(0,3,5);

  // Movimiento con teclado
  const keys = {};
  document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  function animate() {
    requestAnimationFrame(animate);

    const speed = 0.1;
    if (keys['w'] || keys['arrowup']) chicken.position.z -= speed;
    if (keys['s'] || keys['arrowdown']) chicken.position.z += speed;
    if (keys['a'] || keys['arrowleft']) chicken.position.x -= speed;
    if (keys['d'] || keys['arrowright']) chicken.position.x += speed;

    // Cámara sigue al pollo
    camera.position.set(chicken.position.x, chicken.position.y+3, chicken.position.z+5);
    camera.lookAt(chicken.position);

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>

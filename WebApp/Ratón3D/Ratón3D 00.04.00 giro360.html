<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Laberinto 3D FPS</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #instrucciones {
      position: fixed;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white; padding: 10px 20px;
      font-family: sans-serif;
      text-align: center;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="instrucciones">Haz clic en la pantalla para entrar al juego</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/controls/PointerLockControls.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luz
    const light = new THREE.PointLight(0xffffff, 1, 100);
    light.position.set(5, 10, 5);
    scene.add(light);

    // Suelo
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Queso
    const cheese = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color: 0xffff00}));
    cheese.position.set(8, 0.5, 8);
    scene.add(cheese);

    // Laberinto
    const maze = [
      "1111111111",
      "1000000001",
      "1011111101",
      "1010000101",
      "1010110101",
      "1010100101",
      "1010111101",
      "1000000001",
      "1111111111"
    ];
    const walls = [];
    const wallMaterial = new THREE.MeshPhongMaterial({color: 0x333333});
    for (let z = 0; z < maze.length; z++) {
      for (let x = 0; x < maze[z].length; x++) {
        if (maze[z][x] === "1") {
          const wall = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), wallMaterial);
          wall.position.set(x-5,1,z-5);
          scene.add(wall);
          walls.push(wall);
        }
      }
    }

    // Controles FPS
    const controls = new THREE.PointerLockControls(camera, document.body);
    const instrucciones = document.getElementById("instrucciones");

    // Activar pointer lock al hacer clic en el canvas
    renderer.domElement.addEventListener("click", () => {
      controls.lock();
    });

    controls.addEventListener("lock", () => {
      instrucciones.style.display = "none";
    });
    controls.addEventListener("unlock", () => {
      instrucciones.style.display = "";
    });

    camera.position.set(-8, 1.5, -8);

    // Movimiento
    const keys = {};
    document.addEventListener("keydown", (e) => keys[e.key] = true);
    document.addEventListener("keyup", (e) => keys[e.key] = false);

    function movePlayer() {
      const step = 0.1;
      let newX = camera.position.x;
      let newZ = camera.position.z;

      if (keys["ArrowUp"] || keys["w"]) {
        newX -= Math.sin(camera.rotation.y) * step;
        newZ -= Math.cos(camera.rotation.y) * step;
      }
      if (keys["ArrowDown"] || keys["s"]) {
        newX += Math.sin(camera.rotation.y) * step;
        newZ += Math.cos(camera.rotation.y) * step;
      }
      if (keys["ArrowLeft"] || keys["a"]) {
        newX -= Math.cos(camera.rotation.y) * step;
        newZ += Math.sin(camera.rotation.y) * step;
      }
      if (keys["ArrowRight"] || keys["d"]) {
        newX += Math.cos(camera.rotation.y) * step;
        newZ -= Math.sin(camera.rotation.y) * step;
      }

      // Colisiones
      let collision = false;
      for (let wall of walls) {
        const dx = Math.abs(newX - wall.position.x);
        const dz = Math.abs(newZ - wall.position.z);
        if (dx < 0.75 && dz < 0.75) {
          collision = true;
          break;
        }
      }

      if (!collision) {
        camera.position.x = newX;
        camera.position.z = newZ;
      }

      // Victoria
      if (camera.position.distanceTo(cheese.position) < 1) {
        alert("¡Ganaste! El ratón encontró su queso 🧀");
        controls.unlock();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      movePlayer();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
